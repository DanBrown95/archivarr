name: CI

# One pipeline: verify (gofmt/vet/test), then build the image — publishing only
# when the verify gate passes. Lean git-flow branching model:
#
#   PR (any target)   -> verify + build image (no push)
#   push to develop   -> verify + push ghcr.io/<owner>/archivarr:nightly
#   push to master    -> verify + build image (no push)   [releases come from tags]
#   push tag vX.Y.Z   -> verify + push :X.Y.Z, :X.Y, :latest
#
# Cut a release by tagging master:
#   git tag -a v0.2.0 -m "Release 0.2.0" && git push origin v0.2.0
#
# Auth uses the automatic GITHUB_TOKEN (no secrets to manage). docker/metadata-action
# lowercases the image name, so the DanBrown95 owner becomes danbrown95 automatically.

on:
  pull_request:
  push:
    branches: [develop, master]
    tags: ["v*"]

# Cancel superseded runs for the same ref (e.g. rapid develop pushes). Each tag is
# its own ref, so release builds are never cancelled by ongoing branch pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Format, vet & test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt (fail if any file is unformatted)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  image:
    name: Build image (push on develop & tags)
    needs: test # never publish unless the verify gate is green
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # PUBLISH is true only for pushes to develop or a vX.Y.Z tag. PRs and master
    # pushes still build the image (to catch breakage) but never push it.
    env:
      PUBLISH: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & version
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build (and push on develop / tags)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ env.PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
