name: Publish image

# Builds and pushes the Docker image to GitHub Container Registry (GHCR).
#
#   push to develop   -> ghcr.io/<owner>/archivarr:nightly   (nightly/test channel)
#   tag    vX.Y.Z      -> ghcr.io/<owner>/archivarr:X.Y.Z, :X.Y, :latest  (stable channel)
#
# Auth uses the automatic GITHUB_TOKEN (no secrets to manage); the job just needs
# packages: write. The image name is lowercased by docker/metadata-action, so the
# DanBrown95 owner becomes danbrown95 automatically.

on:
  push:
    branches: [develop]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
