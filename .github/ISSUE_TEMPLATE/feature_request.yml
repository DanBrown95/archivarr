name: Feature request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please **check [`TODO.md`](https://github.com/DanBrown95/archivarr/blob/develop/TODO.md)
        and existing issues** first — it may already be planned. For open-ended
        ideas, a [Discussion](https://github.com/DanBrown95/archivarr/discussions)
        is often a better starting point.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and the roadmap (TODO.md) and this isn't a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or use case, not just the solution you have in mind.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Archivarr to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
