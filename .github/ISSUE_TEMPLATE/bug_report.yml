name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please **search existing issues**
        first — your problem may already be reported. For questions and setup help,
        use [Discussions](https://github.com/DanBrown95/archivarr/discussions) instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: This is a bug, not a question or feature request.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I scan a source, the last scan time never updates…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we make it happen?
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Docker image tag, or the git commit you built from.
      placeholder: "develop @ a1b2c3d, or image :latest"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Deployment & environment
      description: How are you running Archivarr? (NAS/OS, Docker version, etc.)
      placeholder: UGREEN NASync, Docker 27.x, source on /media (ro), drives on /mnt
    validations:
      required: true
  - type: textarea
    id: compose
    attributes:
      label: docker-compose.yml
      description: Your compose file or run command. **Redact any secrets.**
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste container logs around the time of the problem.
      render: shell
